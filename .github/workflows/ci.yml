name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @kenmo/db run generate

      - name: Type check (core)
        run: pnpm --filter @kenmo/core exec tsc --noEmit

      - name: Type check (api)
        run: pnpm --filter @kenmo/api exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter @kenmo/core run test

      - name: Build (core)
        run: pnpm --filter @kenmo/core run build

      - name: Build (api)
        run: pnpm --filter @kenmo/api run build
